name: Mirror Release to Public Repo

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  mirror:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag from release workflow
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git remote add public https://github.com/steveneppler/teslog-web.git
          git push public ${{ steps.tag.outputs.TAG }}

      - name: Get release notes from private repo
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.TAG }}';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: 'steveneppler',
              repo: 'teslog-web-private',
              tag: tag
            });
            core.setOutput('body', release.body || '');
            core.setOutput('name', release.name || tag);

      - name: Create release on public repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          script: |
            await github.rest.repos.createRelease({
              owner: 'steveneppler',
              repo: 'teslog-web',
              tag_name: '${{ steps.tag.outputs.TAG }}',
              name: '${{ steps.notes.outputs.name }}',
              body: `${{ steps.notes.outputs.body }}`,
              draft: false,
              prerelease: false
            });
