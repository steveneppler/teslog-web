        type: integer
    placeId:
      name: placeId
      in: path
      required: true
      schema:
        type: integer
    perPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
    page:
      name: page
      in: query
      schema:
